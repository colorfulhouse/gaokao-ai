<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>高考AI择校助手 - 智能匹配你的理想大学</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <style>
:root {
  --primary: #6366f1;
  --primary-light: #818cf8;
  --primary-dark: #4f46e5;
  --accent: #f59e0b;
  --accent-light: #fbbf24;
  --success: #10b981;
  --danger: #ef4444;
  --bg: #0f172a;
  --bg-card: #1e293b;
  --bg-card-hover: #334155;
  --text: #f1f5f9;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --border: #334155;
  --radius: 16px;
  --radius-sm: 10px;
  --radius-xs: 6px;
  --shadow: 0 4px 24px rgba(0,0,0,0.3);
  --shadow-lg: 0 8px 48px rgba(0,0,0,0.4);
  --transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
  font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  line-height: 1.6;
}

.particles-bg { position: fixed; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; z-index: 0; overflow: hidden; }

.particle {
  position: absolute; width: 4px; height: 4px; background: var(--primary);
  border-radius: 50%; opacity: 0.3; animation: floatUp linear infinite;
}

@keyframes floatUp {
  0% { transform: translateY(100vh) scale(0); opacity: 0; }
  10% { opacity: 0.3; }
  90% { opacity: 0.3; }
  100% { transform: translateY(-10vh) scale(1); opacity: 0; }
}

.app-container { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 20px; }

.app-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 28px; background: var(--bg-card); border-radius: var(--radius);
  margin-bottom: 24px; border: 1px solid var(--border); flex-wrap: wrap; gap: 16px;
}

.logo { display: flex; align-items: center; gap: 10px; }
.logo-icon { font-size: 32px; animation: bounce 2s ease infinite; }
@keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }

.logo-text {
  font-size: 22px; font-weight: 900;
  background: linear-gradient(135deg, var(--primary-light), var(--accent));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}

.header-steps { display: flex; align-items: center; gap: 8px; }

.step {
  display: flex; align-items: center; gap: 8px; opacity: 0.4; transition: var(--transition);
}
.step.active { opacity: 1; }
.step.completed { opacity: 0.8; }

.step-num {
  width: 30px; height: 30px; border-radius: 50%; background: var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; transition: var(--transition);
}

.step.active .step-num { background: var(--primary); box-shadow: 0 0 16px rgba(99,102,241,0.4); }
.step.completed .step-num { background: var(--success); }

.step-label { font-size: 13px; font-weight: 500; color: var(--text-secondary); white-space: nowrap; }
.step.active .step-label { color: var(--text); }
.step-connector { width: 24px; height: 2px; background: var(--border); opacity: 0.4; }

/* 面板 */
.panel { display: none; background: var(--bg-card); border-radius: var(--radius); padding: 32px; border: 1px solid var(--border); animation: fadeSlideIn 0.5s ease; }
.panel.active { display: block; }

@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.panel-header { text-align: center; margin-bottom: 32px; }
.panel-header h2 { font-size: 28px; font-weight: 800; margin-bottom: 8px; }
.panel-header p { color: var(--text-secondary); font-size: 15px; }

/* 表单 */
.question-form { display: flex; flex-direction: column; gap: 28px; }
.form-group { display: flex; flex-direction: column; gap: 12px; }

.form-label { font-size: 16px; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 10px; }

.q-num {
  display: inline-flex; align-items: center; justify-content: center;
  width: 28px; height: 28px; background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border-radius: 8px; font-size: 13px; font-weight: 800; color: white; flex-shrink: 0;
}

.input-row { display: flex; gap: 12px; }

.form-input {
  flex: 1; padding: 14px 18px; background: var(--bg); border: 2px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text); font-size: 18px; font-weight: 600;
  font-family: inherit; transition: var(--transition); outline: none;
}

.form-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99,102,241,0.2); }

.form-select {
  padding: 14px 18px; background: var(--bg); border: 2px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text); font-size: 15px;
  font-family: inherit; cursor: pointer; transition: var(--transition); outline: none; min-width: 140px;
}

.form-select:focus { border-color: var(--primary); }

/* 标签组 */
.tag-group { display: flex; flex-wrap: wrap; gap: 10px; }

.tag {
  padding: 10px 18px; background: var(--bg); border: 2px solid var(--border);
  border-radius: 50px; color: var(--text-secondary); font-size: 14px; font-weight: 500;
  cursor: pointer; transition: var(--transition); font-family: inherit; white-space: nowrap;
}

.tag:hover { border-color: var(--primary-light); color: var(--text); transform: translateY(-2px); }

.tag.selected {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border-color: var(--primary); color: white; box-shadow: 0 4px 16px rgba(99,102,241,0.3);
}

/* 提交按钮 */
.btn-submit {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  width: 100%; padding: 18px; margin-top: 12px;
  background: linear-gradient(135deg, var(--primary), #8b5cf6);
  border: none; border-radius: var(--radius-sm); color: white; font-size: 18px;
  font-weight: 700; cursor: pointer; transition: var(--transition); font-family: inherit; letter-spacing: 0.5px;
}

.btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(99,102,241,0.4); }
.btn-submit:active { transform: translateY(0); }
.btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

/* 加载动画 */
.panel-loading.active { display: flex; align-items: center; justify-content: center; text-align: center; min-height: 400px; }
.loading-content { display: flex; flex-direction: column; align-items: center; gap: 24px; }

.ai-brain { position: relative; width: 100px; height: 100px; display: flex; align-items: center; justify-content: center; }
.brain-icon { font-size: 60px; position: relative; z-index: 2; animation: brainPulse 2s ease infinite; }

.brain-pulse {
  position: absolute; width: 100%; height: 100%; border-radius: 50%;
  background: var(--primary); opacity: 0.15; animation: pulseRing 2s ease infinite;
}

@keyframes brainPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
@keyframes pulseRing { 0% { transform: scale(0.8); opacity: 0.3; } 100% { transform: scale(1.5); opacity: 0; } }

.loading-content h2 { font-size: 22px; font-weight: 700; }
.loading-steps { display: flex; flex-direction: column; gap: 10px; width: 280px; }

.loading-step {
  padding: 10px 16px; background: var(--bg); border-radius: var(--radius-xs);
  font-size: 14px; color: var(--text-muted); text-align: left; transition: var(--transition); border: 1px solid transparent;
}

.loading-step.done { color: var(--success); border-color: rgba(16,185,129,0.2); background: rgba(16,185,129,0.05); }
.loading-step.current { color: var(--primary-light); border-color: rgba(99,102,241,0.2); animation: shimmer 1.5s ease infinite; }

@keyframes shimmer { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

/* 结果面板 */
.results-header { text-align: center; margin-bottom: 28px; }
.results-header h2 { font-size: 28px; font-weight: 800; margin-bottom: 8px; }
.results-header p { color: var(--text-secondary); }

.match-summary { display: flex; gap: 16px; margin-bottom: 32px; flex-wrap: wrap; }

.match-card {
  flex: 1; min-width: 200px; background: var(--bg); border-radius: var(--radius-sm);
  padding: 20px; text-align: center; border: 1px solid var(--border); cursor: pointer;
  transition: var(--transition); position: relative; overflow: hidden;
}

.match-card:hover { transform: translateY(-4px); border-color: var(--primary); box-shadow: var(--shadow); }

.match-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, var(--primary), var(--accent));
}

.match-card .match-rank { font-size: 14px; color: var(--accent); font-weight: 700; margin-bottom: 4px; }
.match-card .match-school { font-size: 18px; font-weight: 800; margin-bottom: 4px; }

.match-card .match-score {
  font-size: 32px; font-weight: 900;
  background: linear-gradient(135deg, var(--primary-light), var(--accent-light));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}

.match-card .match-score-label { font-size: 12px; color: var(--text-muted); }

.schools-grid { display: flex; flex-direction: column; gap: 20px; }

.school-card { background: var(--bg); border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); transition: var(--transition); }
.school-card:hover { border-color: var(--primary-light); box-shadow: var(--shadow); }

.school-card-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 24px; cursor: pointer; transition: var(--transition);
}

.school-card-header:hover { background: var(--bg-card); }
.school-card-left { display: flex; align-items: center; gap: 16px; }

.school-badge {
  width: 56px; height: 56px; border-radius: 14px;
  background: linear-gradient(135deg, var(--primary), #8b5cf6);
  display: flex; align-items: center; justify-content: center; font-size: 26px; flex-shrink: 0;
}

.school-info h3 { font-size: 20px; font-weight: 800; margin-bottom: 4px; }
.school-tags { display: flex; gap: 6px; flex-wrap: wrap; }

.school-tag { padding: 2px 10px; background: rgba(99,102,241,0.15); border-radius: 50px; font-size: 11px; color: var(--primary-light); font-weight: 600; }
.school-tag.accent { background: rgba(245,158,11,0.15); color: var(--accent-light); }

.school-card-right { display: flex; align-items: center; gap: 16px; }

.match-percent {
  font-size: 36px; font-weight: 900;
  background: linear-gradient(135deg, var(--primary-light), var(--accent-light));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}

.expand-icon { font-size: 20px; color: var(--text-muted); transition: var(--transition); }
.school-card.expanded .expand-icon { transform: rotate(180deg); }

.school-card-body { display: none; padding: 0 24px 24px; animation: fadeSlideIn 0.3s ease; }
.school-card.expanded .school-card-body { display: block; }

.dimensions-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px; margin-bottom: 24px; }

.dimension-item { display: flex; flex-direction: column; gap: 6px; }
.dimension-label { display: flex; justify-content: space-between; font-size: 13px; color: var(--text-secondary); }
.dimension-bar { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
.dimension-fill { height: 100%; border-radius: 4px; transition: width 1s ease; }

.dim-teacher { background: linear-gradient(90deg, #6366f1, #818cf8); }
.dim-campus { background: linear-gradient(90deg, #10b981, #34d399); }
.dim-dorm { background: linear-gradient(90deg, #f59e0b, #fbbf24); }
.dim-food { background: linear-gradient(90deg, #ef4444, #f87171); }
.dim-fun { background: linear-gradient(90deg, #ec4899, #f472b6); }
.dim-employ { background: linear-gradient(90deg, #06b6d4, #22d3ee); }

.school-desc { color: var(--text-secondary); font-size: 14px; line-height: 1.8; margin-bottom: 20px; padding: 16px; background: var(--bg-card); border-radius: var(--radius-sm); }

.detail-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-bottom: 20px; }

.detail-item { padding: 14px; background: var(--bg-card); border-radius: var(--radius-sm); border: 1px solid transparent; transition: var(--transition); }
.detail-item:hover { border-color: var(--border); }
.detail-icon { font-size: 24px; margin-bottom: 6px; }
.detail-label { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
.detail-value { font-size: 14px; font-weight: 600; color: var(--text); }

.pros-cons { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
.pros, .cons { padding: 16px; border-radius: var(--radius-sm); }
.pros { background: rgba(16,185,129,0.08); border: 1px solid rgba(16,185,129,0.15); }
.cons { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.15); }
.pros h4, .cons h4 { font-size: 15px; font-weight: 700; margin-bottom: 10px; }
.pros h4 { color: var(--success); }
.cons h4 { color: var(--danger); }
.pros ul, .cons ul { list-style: none; display: flex; flex-direction: column; gap: 6px; }
.pros li, .cons li { font-size: 13px; color: var(--text-secondary); padding-left: 16px; position: relative; }
.pros li::before { content: '✓'; position: absolute; left: 0; color: var(--success); font-weight: 700; }
.cons li::before { content: '✗'; position: absolute; left: 0; color: var(--danger); font-weight: 700; }

.btn-detail {
  width: 100%; padding: 12px;
  background: linear-gradient(135deg, var(--primary), #8b5cf6);
  border: none; border-radius: var(--radius-sm); color: white;
  font-size: 15px; font-weight: 600; cursor: pointer; transition: var(--transition); font-family: inherit;
}

.btn-detail:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(99,102,241,0.3); }

/* 弹窗 */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center;
  padding: 20px; backdrop-filter: blur(4px);
}

.modal-overlay.active { display: flex; }

.modal {
  background: var(--bg-card); border-radius: var(--radius);
  max-width: 700px; width: 100%; max-height: 85vh; overflow-y: auto;
  position: relative; border: 1px solid var(--border); animation: fadeSlideIn 0.3s ease;
}

.modal-close {
  position: sticky; top: 16px; right: 16px; float: right;
  width: 36px; height: 36px; border-radius: 50%; background: var(--bg);
  border: 1px solid var(--border); color: var(--text); font-size: 20px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: var(--transition); z-index: 10;
}

.modal-close:hover { background: var(--danger); border-color: var(--danger); }
.modal-content { padding: 32px; padding-top: 0; }

.modal-school-header { text-align: center; margin-bottom: 24px; padding-top: 16px; }
.modal-school-header h2 { font-size: 28px; font-weight: 900; margin-bottom: 8px; }

.modal-school-header .tier-badge {
  display: inline-block; padding: 4px 16px;
  background: linear-gradient(135deg, var(--accent), #f97316);
  border-radius: 50px; font-size: 13px; font-weight: 700; color: white;
}

.image-gallery { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
.image-gallery img { width: 100%; height: 180px; object-fit: cover; border-radius: var(--radius-sm); }

/* 响应式 */
@media (max-width: 768px) {
  .app-container { padding: 12px; }
  .app-header { flex-direction: column; text-align: center; padding: 16px; }
  .header-steps { flex-wrap: wrap; justify-content: center; }
  .panel { padding: 20px; }
  .panel-header h2 { font-size: 22px; }
  .input-row { flex-direction: column; }
  .match-summary { flex-direction: column; }
  .school-card-header { flex-direction: column; gap: 12px; text-align: center; }
  .school-card-left { flex-direction: column; }
  .school-card-right { flex-direction: column; }
  .pros-cons { grid-template-columns: 1fr; }
  .dimensions-grid { grid-template-columns: 1fr; }
  .detail-grid { grid-template-columns: 1fr; }
  .image-gallery { grid-template-columns: 1fr; }
  .modal-content { padding: 20px; }
}

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
  </style>
</head>
<body>
  <!-- 粒子背景 -->
  <div class="particles-bg" id="particlesBg"></div>

  <!-- 主容器 -->
  <div class="app-container">
    <header class="app-header">
      <div class="logo">
        <span class="logo-icon">🎓</span>
        <span class="logo-text">高考AI择校助手</span>
      </div>
      <div class="header-steps" id="headerSteps">
        <div class="step active" data-step="1">
          <span class="step-num">1</span>
          <span class="step-label">信息填写</span>
        </div>
        <div class="step-connector"></div>
        <div class="step" data-step="2">
          <span class="step-num">2</span>
          <span class="step-label">AI匹配</span>
        </div>
        <div class="step-connector"></div>
        <div class="step" data-step="3">
          <span class="step-num">3</span>
          <span class="step-label">学校详情</span>
        </div>
      </div>
    </header>

    <main class="app-main">
      <!-- 步骤1：问答表单 -->
      <section class="panel panel-form active" id="panelForm">
        <div class="panel-header">
          <h2>📋 填写你的信息</h2>
          <p>回答以下问题，AI将为你智能匹配最合适的大学</p>
        </div>

        <form id="questionForm" class="question-form" onsubmit="return handleSubmit()" novalidate>
          <div class="form-group">
            <label class="form-label"><span class="q-num">Q1</span>你的高考分数（或预估分数）是多少？</label>
            <div class="input-row">
              <input type="number" id="score" class="form-input" placeholder="例：650" min="300" max="750" required>
              <select id="province" class="form-select" required>
                <option value="">选择省份</option>
                <option value="北京">北京</option><option value="上海">上海</option><option value="广东">广东</option>
                <option value="浙江">浙江</option><option value="江苏">江苏</option><option value="湖北">湖北</option>
                <option value="四川">四川</option><option value="陕西">陕西</option><option value="山东">山东</option>
                <option value="河南">河南</option><option value="福建">福建</option><option value="湖南">湖南</option>
                <option value="安徽">安徽</option><option value="河北">河北</option><option value="辽宁">辽宁</option>
                <option value="吉林">吉林</option><option value="黑龙江">黑龙江</option><option value="重庆">重庆</option>
                <option value="天津">天津</option><option value="山西">山西</option><option value="江西">江西</option>
                <option value="广西">广西</option><option value="云南">云南</option><option value="贵州">贵州</option>
                <option value="甘肃">甘肃</option><option value="内蒙古">内蒙古</option><option value="新疆">新疆</option>
                <option value="西藏">西藏</option><option value="海南">海南</option><option value="宁夏">宁夏</option>
                <option value="青海">青海</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label"><span class="q-num">Q2</span>你感兴趣的专业方向是什么？</label>
            <div class="tag-group" id="interestTags">
              <button type="button" class="tag" data-value="工科">🔧 工科（计算机/机械/电气等）</button>
              <button type="button" class="tag" data-value="理科">🔬 理科（数学/物理/化学等）</button>
              <button type="button" class="tag" data-value="文科">📚 文科（中文/历史/哲学等）</button>
              <button type="button" class="tag" data-value="医学">💊 医学（临床/口腔/药学等）</button>
              <button type="button" class="tag" data-value="商科">💰 商科（金融/会计/管理等）</button>
              <button type="button" class="tag" data-value="法学">⚖️ 法学</button>
              <button type="button" class="tag" data-value="艺术">🎨 艺术/设计</button>
            </div>
            <input type="hidden" id="interest">
          </div>

          <div class="form-group">
            <label class="form-label"><span class="q-num">Q3</span>你对学校所在城市有什么偏好？</label>
            <div class="tag-group" id="cityTags">
              <button type="button" class="tag" data-value="一线">🌆 一线城市（北上广深）</button>
              <button type="button" class="tag" data-value="新一线">🏙️ 新一线（杭州/成都/武汉等）</button>
              <button type="button" class="tag" data-value="离家近">🏠 离家近最重要</button>
              <button type="button" class="tag" data-value="无所谓">🌍 无所谓，学校好就行</button>
            </div>
            <input type="hidden" id="cityPreference">
          </div>

          <div class="form-group">
            <label class="form-label"><span class="q-num">Q4</span>你更看重学校的名气（985/211）还是专业实力？</label>
